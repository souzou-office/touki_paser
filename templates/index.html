<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登記情報パーサー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif; background: #f5f6fa; color: #2d3436; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin: 20px 0; font-size: 1.6em; color: #2d3436; }
    h1 small { display: block; font-size: 0.5em; color: #636e72; font-weight: normal; margin-top: 4px; }

    /* アップロード */
    .upload-area { border: 2px dashed #b2bec3; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 24px; background: #fff; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover, .upload-area.dragover { border-color: #0984e3; background: #f0f6ff; }
    .upload-area input { display: none; }
    .upload-area p { font-size: 1.1em; color: #636e72; }
    .upload-area .icon { font-size: 2.5em; margin-bottom: 8px; }
    .btn { display: inline-block; padding: 10px 28px; background: #0984e3; color: #fff; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; margin-top: 12px; }
    .btn:hover { background: #0876cc; }

    /* ローディング */
    .loading { display: none; text-align: center; padding: 40px; }
    .loading.active { display: block; }
    .spinner { width: 40px; height: 40px; border: 4px solid #dfe6e9; border-top: 4px solid #0984e3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 結果 */
    .result { display: none; }
    .result.active { display: block; }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow: hidden; }
    .card-header { background: #2d3436; color: #fff; padding: 12px 20px; font-size: 1.05em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .card-header .badge { background: #0984e3; padding: 3px 12px; border-radius: 12px; font-size: 0.8em; }
    .card-body { padding: 16px 20px; }

    .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 6px 16px; }
    .info-grid .label { color: #636e72; font-size: 0.9em; font-weight: bold; padding: 4px 0; }
    .info-grid .value { padding: 4px 0; word-break: break-all; }

    /* 権利部テーブル */
    .kenri-table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
    .kenri-table th { background: #dfe6e9; padding: 8px 12px; text-align: left; white-space: nowrap; font-weight: bold; }
    .kenri-table td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    .kenri-table tr:hover { background: #f8f9fa; }

    .detail-list { margin: 0; padding: 0; list-style: none; }
    .detail-list li { margin-bottom: 3px; }
    .detail-list .dk { color: #636e72; font-size: 0.85em; margin-right: 4px; }

    /* 床面積 */
    .menseki-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .menseki-item { background: #f0f6ff; padding: 3px 10px; border-radius: 4px; font-size: 0.9em; }

    /* 所在リスト */
    .shozai-list { list-style: none; padding: 0; }
    .shozai-list li { padding: 2px 0; }
    .shozai-list li + li { color: #636e72; font-size: 0.9em; }

    /* エラー */
    .error { background: #ffe0e0; color: #d63031; padding: 16px; border-radius: 8px; margin: 20px 0; display: none; }
    .error.active { display: block; }

    /* JSON表示 */
    .json-toggle { text-align: right; margin-bottom: 8px; }
    .json-toggle button { background: none; border: 1px solid #b2bec3; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; color: #636e72; }
    .json-area { display: none; background: #2d3436; color: #dfe6e9; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 0.85em; font-family: "Consolas", "Monaco", monospace; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
    .json-area.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>登記情報パーサー<small>不動産登記PDFを解析して構造化表示します</small></h1>

    <div class="upload-area" id="uploadArea">
      <div class="icon">📄</div>
      <p>登記情報PDFをドラッグ＆ドロップ<br>またはクリックして選択</p>
      <input type="file" id="fileInput" accept=".pdf">
      <button class="btn" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>解析中...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result"></div>

    <div class="json-toggle" id="jsonToggle" style="display:none">
      <button onclick="toggleJson()">JSON表示</button>
    </div>
    <pre class="json-area" id="jsonArea"></pre>
  </div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const errorDiv = document.getElementById('error');
const resultDiv = document.getElementById('result');
const jsonToggle = document.getElementById('jsonToggle');
const jsonArea = document.getElementById('jsonArea');

// ドラッグ＆ドロップ
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
});
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files.length > 0) processFile(fileInput.files[0]); });

async function processFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showError('PDFファイルを選択してください');
    return;
  }

  loading.classList.add('active');
  resultDiv.classList.remove('active');
  errorDiv.classList.remove('active');
  jsonToggle.style.display = 'none';
  jsonArea.classList.remove('active');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/parse', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
    } else {
      renderResult(data);
    }
  } catch (e) {
    showError('通信エラー: ' + e.message);
  } finally {
    loading.classList.remove('active');
  }
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add('active');
}

function toggleJson() {
  jsonArea.classList.toggle('active');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function renderResult(data) {
  let html = '';

  // ヘッダー
  html += `<div class="card">
    <div class="card-header">
      基本情報
      <span class="badge">${esc(data['種別'] || '不明')}</span>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="label">ファイル名</div><div class="value">${esc(data['ファイル名'])}</div>`;

  const h = data['ヘッダー'] || {};
  if (h['発行年月日']) html += `<div class="label">発行年月日</div><div class="value">${esc(h['発行年月日'])}</div>`;
  if (h['照会番号']) html += `<div class="label">照会番号</div><div class="value">${esc(h['照会番号'])}</div>`;
  if (h['現在日時']) html += `<div class="label">取得日時</div><div class="value">${esc(h['現在日時'])}</div>`;

  html += `</div></div></div>`;

  // 表題部（土地）
  if (data['種別'] === '土地') {
    const t = data['表題部'] || {};
    html += renderHyodaibuTochi(t);
  }

  // 表題部（建物）
  if (data['種別'] === '建物') {
    const t = data['表題部'] || {};
    html += renderHyodaibuTatemono(t);
  }

  // 区分建物
  if (data['種別'] === '区分建物') {
    if (data['一棟の建物の表示']) html += renderIttou(data['一棟の建物の表示']);
    if (data['敷地権の目的である土地']) html += renderShikichiken(data['敷地権の目的である土地']);
    if (data['専有部分の建物の表示']) html += renderSenyuu(data['専有部分の建物の表示']);
    if (data['敷地権の表示']) html += renderShikichikenHyoji(data['敷地権の表示']);
  }

  // 権利部（甲区）
  if (data['権利部_甲区'] && data['権利部_甲区'].length > 0) {
    html += renderKenribu(data['権利部_甲区'], '権利部（甲区）', '所有権に関する事項');
  }

  // 権利部（乙区）
  if (data['権利部_乙区'] && data['権利部_乙区'].length > 0) {
    html += renderKenribu(data['権利部_乙区'], '権利部（乙区）', '所有権以外の権利に関する事項');
  }

  // 共同担保目録
  if (data['共同担保目録']) {
    html += renderKyoudouTanpo(data['共同担保目録']);
  }

  resultDiv.innerHTML = html;
  resultDiv.classList.add('active');

  // JSON
  jsonArea.textContent = JSON.stringify(data, null, 2);
  jsonToggle.style.display = 'block';
}

function renderHyodaibuTochi(t) {
  let html = `<div class="card">
    <div class="card-header">表題部（土地の表示）</div>
    <div class="card-body"><div class="info-grid">`;
  if (t['不動産番号']) html += `<div class="label">不動産番号</div><div class="value">${esc(t['不動産番号'])}</div>`;
  if (t['調製']) html += `<div class="label">調製</div><div class="value">${esc(t['調製'])}</div>`;
  if (t['地図番号']) html += `<div class="label">地図番号</div><div class="value">${esc(t['地図番号'])}</div>`;
  if (t['筆界特定']) html += `<div class="label">筆界特定</div><div class="value">${esc(t['筆界特定'])}</div>`;

  if (t['所在'] && t['所在'].length > 0) {
    html += `<div class="label">所在</div><div class="value"><ul class="shozai-list">`;
    t['所在'].forEach(s => html += `<li>${esc(s)}</li>`);
    html += `</ul></div>`;
  }

  if (t['地番']) html += `<div class="label">地番</div><div class="value"><strong>${esc(t['地番'])}</strong></div>`;
  if (t['地目']) html += `<div class="label">地目</div><div class="value"><strong>${esc(t['地目'])}</strong></div>`;
  if (t['地積']) html += `<div class="label">地積</div><div class="value"><strong>${esc(t['地積'])} ㎡</strong></div>`;

  // 地番履歴
  if (t['地番履歴'] && t['地番履歴'].length > 0) {
    html += `<div class="label">変更履歴</div><div class="value"><ul class="detail-list">`;
    t['地番履歴'].forEach(e => {
      let parts = [];
      if (e['地番']) parts.push(e['地番']);
      if (e['地目']) parts.push(e['地目']);
      if (e['地積']) parts.push(e['地積'] + '㎡');
      if (e['原因日付']) parts.push(e['原因日付']);
      if (e['追加情報']) e['追加情報'].forEach(a => parts.push(a));
      html += `<li>${esc(parts.join(' / '))}</li>`;
    });
    html += `</ul></div>`;
  }

  html += `</div></div></div>`;
  return html;
}

function renderHyodaibuTatemono(t) {
  let html = `<div class="card">
    <div class="card-header">表題部（建物の表示）</div>
    <div class="card-body"><div class="info-grid">`;
  if (t['不動産番号']) html += `<div class="label">不動産番号</div><div class="value">${esc(t['不動産番号'])}</div>`;
  if (t['調製']) html += `<div class="label">調製</div><div class="value">${esc(t['調製'])}</div>`;
  if (t['所在']) html += `<div class="label">所在</div><div class="value">${esc(t['所在'])}</div>`;
  if (t['家屋番号']) html += `<div class="label">家屋番号</div><div class="value">${esc(t['家屋番号'])}</div>`;
  if (t['建物の名称']) html += `<div class="label">建物の名称</div><div class="value">${esc(t['建物の名称'])}</div>`;
  if (t['種類']) html += `<div class="label">種類</div><div class="value"><strong>${esc(t['種類'])}</strong></div>`;
  if (t['構造']) html += `<div class="label">構造</div><div class="value"><strong>${esc(t['構造'])}</strong></div>`;

  if (t['床面積'] && t['床面積'].length > 0) {
    html += `<div class="label">床面積</div><div class="value"><div class="menseki-list">`;
    t['床面積'].forEach(m => html += `<span class="menseki-item">${esc(m)} ㎡</span>`);
    html += `</div></div>`;
  }

  if (t['原因日付'] && t['原因日付'].length > 0) {
    html += `<div class="label">原因及び日付</div><div class="value"><ul class="detail-list">`;
    t['原因日付'].forEach(r => { if (r) html += `<li>${esc(r)}</li>`; });
    html += `</ul></div>`;
  }

  html += `</div></div></div>`;
  return html;
}

function renderIttou(d) {
  let html = `<div class="card">
    <div class="card-header">表題部（一棟の建物の表示）</div>
    <div class="card-body"><div class="info-grid">`;
  if (d['調製']) html += `<div class="label">調製</div><div class="value">${esc(d['調製'])}</div>`;
  if (d['所在']) html += `<div class="label">所在</div><div class="value">${esc(d['所在'])}</div>`;
  if (d['建物の名称']) html += `<div class="label">建物の名称</div><div class="value"><strong>${esc(d['建物の名称'])}</strong></div>`;
  if (d['構造']) html += `<div class="label">構造</div><div class="value">${esc(d['構造'])}</div>`;

  if (d['床面積'] && d['床面積'].length > 0) {
    html += `<div class="label">床面積</div><div class="value"><div class="menseki-list">`;
    d['床面積'].forEach(m => html += `<span class="menseki-item">${esc(m)} ㎡</span>`);
    html += `</div></div>`;
  }

  html += `</div></div></div>`;
  return html;
}

function renderShikichiken(list) {
  let html = `<div class="card">
    <div class="card-header">表題部（敷地権の目的である土地の表示）</div>
    <div class="card-body">
    <table class="kenri-table"><tr><th>符号</th><th>所在及び地番</th><th>地目</th><th>地積</th><th>登記の日付</th></tr>`;
  list.forEach(e => {
    html += `<tr>
      <td>${esc(e['土地の符号'])}</td>
      <td>${esc(e['所在及び地番'])}</td>
      <td>${esc(e['地目'])}</td>
      <td>${esc(e['地積'])} ㎡</td>
      <td>${esc(e['登記の日付'])}</td>
    </tr>`;
  });
  html += `</table></div></div>`;
  return html;
}

function renderSenyuu(d) {
  let html = `<div class="card">
    <div class="card-header">表題部（専有部分の建物の表示）</div>
    <div class="card-body"><div class="info-grid">`;
  if (d['不動産番号']) html += `<div class="label">不動産番号</div><div class="value">${esc(d['不動産番号'])}</div>`;
  if (d['家屋番号']) html += `<div class="label">家屋番号</div><div class="value">${esc(d['家屋番号'])}</div>`;
  if (d['建物の名称']) html += `<div class="label">建物の名称</div><div class="value">${esc(d['建物の名称'])}</div>`;
  if (d['種類']) html += `<div class="label">種類</div><div class="value"><strong>${esc(d['種類'])}</strong></div>`;
  if (d['構造']) html += `<div class="label">構造</div><div class="value"><strong>${esc(d['構造'])}</strong></div>`;

  if (d['床面積'] && d['床面積'].length > 0) {
    html += `<div class="label">床面積</div><div class="value"><div class="menseki-list">`;
    d['床面積'].forEach(m => html += `<span class="menseki-item">${esc(m)} ㎡</span>`);
    html += `</div></div>`;
  }

  html += `</div></div></div>`;
  return html;
}

function renderShikichikenHyoji(list) {
  let html = `<div class="card">
    <div class="card-header">表題部（敷地権の表示）</div>
    <div class="card-body">
    <table class="kenri-table"><tr><th>土地の符号</th><th>敷地権の種類</th><th>敷地権の割合</th><th>原因及び日付</th></tr>`;
  list.forEach(e => {
    html += `<tr>
      <td>${esc(e['土地の符号'])}</td>
      <td>${esc(e['敷地権の種類'])}</td>
      <td>${esc(e['敷地権の割合'])}</td>
      <td>${esc(e['原因日付'])}</td>
    </tr>`;
  });
  html += `</table></div></div>`;
  return html;
}

function renderKenribu(entries, title, subtitle) {
  let html = `<div class="card">
    <div class="card-header">${esc(title)}<span class="badge">${esc(subtitle)}</span></div>
    <div class="card-body">
    <table class="kenri-table">
      <tr><th>順位</th><th>登記の目的</th><th>受付年月日</th><th>受付番号</th><th>権利者その他の事項</th></tr>`;

  entries.forEach(e => {
    let detailHtml = '<ul class="detail-list">';
    const d = e['詳細'] || {};
    for (const [k, v] of Object.entries(d)) {
      detailHtml += `<li><span class="dk">${esc(k)}</span>${esc(v)}</li>`;
    }
    detailHtml += '</ul>';

    html += `<tr>
      <td>${esc(e['順位番号'])}</td>
      <td>${esc(e['登記の目的'])}</td>
      <td style="white-space:nowrap">${esc(e['受付年月日'])}</td>
      <td style="white-space:nowrap">${esc(e['受付番号'])}</td>
      <td>${detailHtml}</td>
    </tr>`;
  });

  html += `</table></div></div>`;
  return html;
}

function renderKyoudouTanpo(d) {
  let html = `<div class="card">
    <div class="card-header">共同担保目録</div>
    <div class="card-body">
    <div class="info-grid">
      <div class="label">記号及び番号</div><div class="value">${esc(d['記号番号'])}</div>
      <div class="label">調製</div><div class="value">${esc(d['調製'])}</div>
    </div>`;

  if (d['担保一覧'] && d['担保一覧'].length > 0) {
    html += `<table class="kenri-table" style="margin-top:12px">
      <tr><th>番号</th><th>担保の目的である権利の表示</th><th>順位番号</th><th>予備</th></tr>`;
    d['担保一覧'].forEach(e => {
      html += `<tr>
        <td>${esc(e['番号'])}</td>
        <td>${esc(e['担保の目的'])}</td>
        <td>${esc(e['順位番号'])}</td>
        <td>${esc(e['予備'])}</td>
      </tr>`;
    });
    html += `</table>`;
  }

  html += `</div></div>`;
  return html;
}
</script>
</body>
</html>
